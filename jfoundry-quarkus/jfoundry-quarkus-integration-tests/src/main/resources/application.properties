quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:jfoundry-quarkus;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.hibernate-orm.schema-management.strategy=drop-and-create
jfoundry.outbox.recovery.stuck-timeout=0s
jfoundry.outbox.cleanup.published-retention-days=0
jfoundry.outbox.cleanup.dead-lettered-retention-days=0
