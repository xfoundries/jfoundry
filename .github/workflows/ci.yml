name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production-readiness-release
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify documentation
        run: bash scripts/verify-docs.sh

  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java:
          - 21
          - 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run tests
        run: ./mvnw -B test

  package:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Package without tests
        run: ./mvnw -B -DskipTests package

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run middleware integration tests
        run: ./mvnw -B -pl jfoundry-verification/jfoundry-middleware-integration-tests -am -Pit verify

  quarkus-native:
    name: Quarkus Native Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install reactor artifacts
        run: ./mvnw -B -DskipTests install

      - name: Run Quarkus Native Image smoke test
        run: >
          ./mvnw -B
          -pl jfoundry-runtime-integrations/jfoundry-quarkus/integration-tests/jfoundry-quarkus-integration-tests
          -Pnative -Dquarkus.native.container-build=true verify

  helidon-native:
    name: Helidon Native Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: 25
          cache: maven

      - name: Build and smoke test Helidon Native Image
        run: |
          set -euo pipefail
          ./mvnw -B \
            -pl jfoundry-runtime-integrations/jfoundry-helidon/integration-tests/jfoundry-helidon-integration-tests \
            -am -Pnative-image package

          application=jfoundry-runtime-integrations/jfoundry-helidon/integration-tests/jfoundry-helidon-integration-tests/target/jfoundry-helidon-integration-tests
          "$application" >/tmp/jfoundry-helidon-native.log 2>&1 &
          application_pid=$!
          trap 'kill "$application_pid" 2>/dev/null || true' EXIT

          for attempt in $(seq 1 30); do
            if curl -sS -D /tmp/jfoundry-helidon-problem.headers \
                -o /tmp/jfoundry-helidon-problem.body \
                http://127.0.0.1:7001/jfoundry/problems; then
              if grep -q '^HTTP/1.1 400' /tmp/jfoundry-helidon-problem.headers \
                  && grep -qi '^Content-Type: application/problem+json' /tmp/jfoundry-helidon-problem.headers \
                  && grep -q '"status":400' /tmp/jfoundry-helidon-problem.body; then
                exit 0
              fi
            fi
            sleep 1
          done

          cat /tmp/jfoundry-helidon-native.log
          exit 1

  maven-4:
    name: Maven 4 compatibility
    runs-on: ubuntu-latest
    needs: package
    env:
      MAVEN_VERSION: 4.0.0-rc-5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install Maven 4
        run: |
          curl -fsSLo /tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz \
            https://archive.apache.org/dist/maven/maven-4/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz
          tar -xzf /tmp/apache-maven-${MAVEN_VERSION}-bin.tar.gz -C /tmp
          echo "/tmp/apache-maven-${MAVEN_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Check Maven 4 package compatibility
        run: mvn -B -DskipTests package
